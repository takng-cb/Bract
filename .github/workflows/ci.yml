name: CI

# Issue #19 で導入。PR と main push で lint / test / 3 業種ビルド検証を回す。
# Issue #20 のようなクラスの本番障害を main マージ前に検出するための安全網。

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      smoke_url:
        description: 'Smoke test BASE_URL (e.g. https://bract-crm.vercel.app)'
        required: false
        default: 'https://bract-crm.vercel.app'

permissions:
  contents: read
  pull-requests: read

# 同じ branch で複数 push があった時、古い run はキャンセル
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── lint / 型チェック / Vitest ───────────────────────────────
  static:
    name: Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Vitest
        run: npm run test

  # ── 3 業種ビルド検証 ────────────────────────────────────────
  build:
    name: Build (${{ matrix.industry }})
    runs-on: ubuntu-latest
    needs: static
    strategy:
      fail-fast: false
      matrix:
        industry: [base, real-estate, auto-body]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build for INDUSTRY=${{ matrix.industry }}
        env:
          NEXT_PUBLIC_INDUSTRY: ${{ matrix.industry }}
          # ページデータ収集時に db.ts が neon() を即時初期化するため、
          # 接続文字列が無いとビルド自体が落ちる。クエリは実行されないので
          # ダミーで良い（実 DB 整合は schema-check ジョブが担当）。
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        # `npm run build` ではなく `next build` を直接叩く。
        # `vercel-build` (= check:schema + next build) は Vercel 側で走る。
        # ここでは DB 接続なしで純粋に webpack ビルドの整合性を確認する。
        run: npx next build --webpack
      - name: Bundle size report (${{ matrix.industry }})
        if: matrix.industry == 'real-estate'
        run: |
          echo "### Bundle size (${{ matrix.industry }})" >> $GITHUB_STEP_SUMMARY
          npm run bundle:report >> $GITHUB_STEP_SUMMARY

  # ── schema check (main push のみ) ─────────────────────────
  # 各 Neon の DATABASE_URL は GitHub Secrets に登録（Issue #19）
  # secrets:
  #   - DATABASE_URL_REAL_ESTATE
  #   - DATABASE_URL_AUTO_BODY
  #   - DATABASE_URL_BASE
  schema-check:
    name: Schema ↔ DB (${{ matrix.target }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: real-estate
            secret: DATABASE_URL_REAL_ESTATE
          - target: auto-body
            secret: DATABASE_URL_AUTO_BODY
          - target: base
            secret: DATABASE_URL_BASE
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Check schema for ${{ matrix.target }}
        env:
          DATABASE_URL: ${{ secrets[matrix.secret] }}
        # secret が未設定の Neon はスキップ（一時的に空文字を許容）。
        # secret 設定後は必ず check 通過を要件にする。
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::Secret ${{ matrix.secret }} not set, skipping ${{ matrix.target }}"
            exit 0
          fi
          npm run check:schema

  # ── Smoke test (workflow_dispatch 手動 or push main で本番に対して実行) ─
  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Smoke test against ${{ github.event.inputs.smoke_url || 'https://bract-crm.vercel.app' }}
        env:
          BASE_URL: ${{ github.event.inputs.smoke_url || 'https://bract-crm.vercel.app' }}
        run: npm run smoke

  # ── Secret leak check (push main で本番に対して実行) ───────────
  # public な HTML / JS chunk に service_role や DATABASE_URL credentials が
  # 漏洩していないか検査する。意図せず秘匿情報が client bundle に混入した
  # ケースを検知する安全網。
  secret-leak-check:
    name: Secret leak check
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Secret leak check against ${{ github.event.inputs.smoke_url || 'https://bract-crm.vercel.app' }}
        env:
          BASE_URL: ${{ github.event.inputs.smoke_url || 'https://bract-crm.vercel.app' }}
          # 意図して公開している anon key を許容するために secret 経由で渡す。
          # ALLOWED_ANON_KEY secret が未設定だと JWT-like token として
          # 検出されて fail する可能性がある（その場合は secret を登録すること）。
          ALLOWED_ANON_KEY: ${{ secrets.ALLOWED_ANON_KEY }}
        run: npm run test:secret-leaks

  # ── Playwright E2E (workflow_dispatch 専用、認証が必要なので) ───────
  # 実行前に user 側で以下を準備:
  #   1. scripts/seed-test-users.ts で 3 テストユーザーを各 Neon に投入
  #   2. GitHub Secrets に TEST_USER_PASSWORD を登録
  # 設定が揃わない時は skip（fail しない）。
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: build
    # secrets コンテキストは step の if では参照できない（参照するとワークフロー
    # ファイル全体が実行前に invalid 扱いになり全 run が 0 秒 fail する。実例: 436連敗）。
    # env に「有無フラグ」として写してから if で判定する。
    env:
      HAS_TEST_PW: ${{ secrets.TEST_USER_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Skip if TEST_USER_PASSWORD secret not set
        if: env.HAS_TEST_PW != 'true'
        run: |
          echo "::warning::TEST_USER_PASSWORD secret 未設定のため E2E skip"
          exit 0
      - name: Install Playwright browsers
        if: env.HAS_TEST_PW == 'true'
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        if: env.HAS_TEST_PW == 'true'
        env:
          BASE_URL: ${{ github.event.inputs.smoke_url || 'https://bract-crm.vercel.app' }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always() && env.HAS_TEST_PW == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Lighthouse CI (workflow_dispatch のみ) ─────────────────────
  # 主要公開ページ 4 つに対して Performance / Accessibility / Best Practices /
  # SEO スコアを計測。閾値は緩めに設定し、回帰検知（差分監視）に使う。
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.14.x
          lhci autorun --config=lighthouserc.json
        continue-on-error: true
      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 7
