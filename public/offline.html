<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>オフライン | Bract CRM</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #f4f4f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { background: white; border-radius: 12px; padding: 40px; text-align: center; max-width: 360px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    h1 { font-size: 18px; color: #18181b; margin-bottom: 8px; }
    p  { font-size: 14px; color: #71717a; line-height: 1.6; }
    button { margin-top: 24px; padding: 10px 24px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="box">
    <div style="font-size:48px;margin-bottom:16px">📡</div>
    <h1>オフラインです</h1>
    <p>インターネットに接続されていません。<br>接続を確認してから再度お試しください。</p>
    <button onclick="location.reload()">再読み込み</button>
  </div>
</body>
</html>
